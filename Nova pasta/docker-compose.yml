version: '3.8'

services:
  # Eureka Server - Service Discovery
  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    networks:
      - spring-cloud-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Service A
  service-a:
    build:
      context: .
      dockerfile: Dockerfile
      target: service-a
    container_name: service-a
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=container
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
    networks:
      - spring-cloud-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Service B
  service-b:
    build:
      context: .
      dockerfile: Dockerfile
      target: service-b
    container_name: service-b
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=container
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
    networks:
      - spring-cloud-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Doce Store
  doce-store:
    build:
      context: .
      dockerfile: Dockerfile
      target: doce-store
    container_name: doce-store
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=container
    networks:
      - spring-cloud-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - spring-cloud-network
    depends_on:
      - eureka-server
      - service-a
      - service-b
      - doce-store

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/definitions:/etc/grafana/provisioning/dashboards/definitions:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ALLOW_EMBED_FRAMES=true
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - spring-cloud-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  spring-cloud-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
