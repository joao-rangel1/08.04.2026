<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 Doce Store - Loja de Doces</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: 800;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .search-box:focus {
            outline: none;
            transform: scale(1.05);
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s;
            cursor: pointer;
            animation: fadeIn 0.6s ease-out;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            position: relative;
            overflow: hidden;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        .product-content {
            padding: 25px;
        }

        .category-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-name {
            font-size: 1.4em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .product-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
            line-height: 1.5;
            height: 50px;
            overflow: hidden;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .price {
            font-size: 1.8em;
            font-weight: 800;
            color: #667eea;
        }

        .rating {
            display: flex;
            gap: 3px;
            font-size: 0.9em;
        }

        .star {
            color: #ffc107;
        }

        .stock {
            font-size: 0.85em;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 8px;
            background: #f0f0f0;
            color: #666;
        }

        .stock.low {
            background: #ffe0e0;
            color: #d32f2f;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            font-size: 1em;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .no-products {
            text-align: center;
            color: white;
            padding: 60px 20px;
            font-size: 1.5em;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shine {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        .cart-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: slideInRight 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .loading {
            text-align: center;
            color: white;
            padding: 60px 20px;
            font-size: 1.5em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }

            .search-section {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍰 Doce Store</h1>
            <p>A melhor confeitaria digital do Brasil</p>
        </header>

        <div class="search-section">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Procure por seu doce favorito...">
            <div class="filters" id="filters"></div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
        <div class="loading" id="loading">⏳ Carregando produtos...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:8083/api/produtos';
        let allProducts = [];
        let selectedCategory = null;

        // Carregar categorias
        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categorias/lista`);
                const categories = await response.json();
                const filtersContainer = document.getElementById('filters');
                
                // Adicionar botão "Todos"
                const allBtn = document.createElement('button');
                allBtn.className = 'filter-btn active';
                allBtn.textContent = '✨ Todos';
                allBtn.onclick = () => filterByCategory(null, allBtn);
                filtersContainer.appendChild(allBtn);

                // Adicionar categorias
                categories.forEach((category, idx) => {
                    const emojis = ['🍫', '🍬', '🍭', '🍓', '🍯', '✨'];
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = `${emojis[idx]} ${category}`;
                    btn.onclick = () => filterByCategory(category, btn);
                    filtersContainer.appendChild(btn);
                });
            } catch (error) {
                console.error('Erro ao carregar categorias:', error);
            }
        }

        // Carregar produtos
        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                allProducts = await response.json();
                displayProducts(allProducts);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                document.getElementById('loading').textContent = '❌ Erro ao carregar produtos';
            }
        }

        // Exibir produtos
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.innerHTML = '<div class="no-products">Nenhum produto encontrado 😢</div>';
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const stockClass = product.estoque < 10 ? 'low' : '';
                const stars = '⭐'.repeat(Math.floor(product.rating));

                card.innerHTML = `
                    <div class="product-image">
                        ${product.emoji}
                    </div>
                    <div class="product-content">
                        <span class="category-badge">${product.categoria}</span>
                        <div class="product-name">${product.nome}</div>
                        <div class="product-description">${product.descricao}</div>
                        <div class="product-footer">
                            <div class="price">R$ ${product.preco.toFixed(2)}</div>
                            <div class="rating">${stars} <span style="color: #999;">(${product.avaliacoes})</span></div>
                        </div>
                        <div class="stock ${stockClass}">📦 ${product.estoque} em estoque</div>
                        <button class="add-to-cart-btn" onclick="addToCart('${product.nome}', ${product.preco})">
                            🛒 Adicionar ao Carrinho
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Filtrar por categoria
        function filterByCategory(category, buttonElement) {
            selectedCategory = category;
            
            // Atualizar botão ativo
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            buttonElement.classList.add('active');

            // Filtrar produtos
            if (category) {
                const filtered = allProducts.filter(p => p.categoria === category);
                displayProducts(filtered);
            } else {
                displayProducts(allProducts);
            }

            // Resetar busca
            document.getElementById('searchBox').value = '';
        }

        // Buscar produtos
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (term.length === 0) {
                displayProducts(selectedCategory ? allProducts.filter(p => p.categoria === selectedCategory) : allProducts);
            } else {
                const filtered = allProducts.filter(p => 
                    p.nome.toLowerCase().includes(term) || 
                    p.descricao.toLowerCase().includes(term)
                );
                displayProducts(filtered);
            }
        });

        // Adicionar ao carrinho
        function addToCart(productName, price) {
            const notification = document.createElement('div');
            notification.className = 'cart-notification';
            notification.textContent = `✅ ${productName} adicionado ao carrinho! (R$ ${price.toFixed(2)})`;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Inicializar
        window.addEventListener('load', () => {
            loadCategories();
            loadProducts();
        });
    </script>
</body>
</html>
